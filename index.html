<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMM Yachting - Luxuriöse Yachtcharter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: url('img/bg.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        header {
            padding: 2rem;
            text-align: center;
        }

        .logo {
            max-width: 200px;
            height: auto;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
            margin-bottom: 1rem;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }

        .content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 3rem 2rem;
            border-radius: 20px;
            max-width: 600px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .tagline {
            font-size: 1.2rem;
            font-weight: 300;
            margin-bottom: 2rem;
            opacity: 0.95;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        .cta-button {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
        }

        .cta-button:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        footer {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 2rem;
            font-size: 0.9rem;
            line-height: 1.8;
            color: #333;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .footer-logo {
            max-width: 120px;
            height: auto;
            flex-shrink: 0;
        }

        .footer-text {
            flex: 1;
        }

        .company-info {
            margin-bottom: 0.5rem;
            color: #333;
        }

        .email {
            color: #2c5f8d;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .email:hover {
            opacity: 0.8;
        }

        .footer-links {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        .footer-links a {
            color: #2c5f8d;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .footer-links a:hover {
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .tagline {
                font-size: 1rem;
            }

            .content {
                padding: 2rem 1.5rem;
            }

            .logo {
                max-width: 150px;
            }

            footer {
                font-size: 0.8rem;
            }

            .footer-content {
                flex-direction: column;
                text-align: center;
            }

            .footer-logo {
                max-width: 100px;
            }
        }
    </style>
</head>
<body>
    <header>
        <img src="img/logo.jpg" alt="CMM Yachting Logo" class="logo">
    </header>

    <main>
        <div class="content">
            <h1>CMM YACHTING</h1>
            <p class="tagline">Erleben Sie unvergessliche Momente auf dem Wasser</p>
            <a href="mailto:booking@cmm-yachting.de" class="cta-button">Jetzt Buchen</a>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <img src="img/logo.jpg" alt="CMM Yachting Logo" class="footer-logo">
            <div class="footer-text">
                <div class="company-info">
                    CMM Yachting | Maximilian Miller | Karlsfelder Str. 44a | 80995 München
                </div>
                <div class="company-info">
                    <a href="mailto:booking@cmm-yachting.de" class="email">booking@cmm-yachting.de</a>
                </div>
                <div class="footer-links">
                    <a href="impressum.html">Impressum</a>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
